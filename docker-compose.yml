services:
  postgres:
    image: postgres:16
    container_name: mergington-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mergington
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mergington"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
